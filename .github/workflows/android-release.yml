name: Android Release

on:
  push:
    tags:
      - 'V*'         # Trigger bei Tags wie V0.6.3, V1.0.0
  workflow_dispatch: # Manuell über GitHub UI auslösbar
    inputs:
      version:
        description: 'Version 0.7.3'
        required: true
        default: '0.7.3'

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-android-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-android-

      - name: Create ApiKeys.cs with secrets
        env:
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
        run: |
          cp BookLoggerApp.Infrastructure/Services/ApiKeys.cs.template BookLoggerApp.Infrastructure/Services/ApiKeys.cs
          sed -i "s|GoogleBooks = null|GoogleBooks = \"$GOOGLE_BOOKS_API_KEY\"|" BookLoggerApp.Infrastructure/Services/ApiKeys.cs

      - name: Decode google-services.json
        env:
          FIREBASE_CONFIG_BASE64: ${{ secrets.FIREBASE_CONFIG_BASE64 }}
        run: |
          if [ -z "$FIREBASE_CONFIG_BASE64" ]; then
            echo "::error::FIREBASE_CONFIG_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p BookLoggerApp/Platforms/Android
          echo "$FIREBASE_CONFIG_BASE64" | base64 --decode > BookLoggerApp/Platforms/Android/google-services.json
          if ! grep -q '"project_info"' BookLoggerApp/Platforms/Android/google-services.json; then
            echo "::error::Decoded google-services.json appears invalid (no project_info)"
            exit 1
          fi
          if ! grep -q '"package_name": "com.bookheart.app"' BookLoggerApp/Platforms/Android/google-services.json; then
            echo "::warning::google-services.json does not mention com.bookheart.app — Firebase events may not reach the expected project"
          fi
          echo "google-services.json decoded OK"

      - name: Extract version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DISPLAY_VERSION="${{ github.event.inputs.version }}"
          else
            REF="${{ github.ref_name }}"
            DISPLAY_VERSION="${REF#V}"
          fi
          if echo "$DISPLAY_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$DISPLAY_VERSION"
            VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          else
            DISPLAY_VERSION="0.0.0"
            VERSION_CODE=${{ github.run_number }}
          fi
          echo "DISPLAY_VERSION=$DISPLAY_VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > BookLoggerApp/bookheart.keystore

      - name: Build & sign AAB
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
          ANDROID_STORE_PASS: ${{ secrets.ANDROID_STORE_PASS }}
        run: |
          dotnet publish BookLoggerApp/BookLoggerApp.csproj \
            -f net10.0-android \
            -c Release \
            -p:ApplicationDisplayVersion=${{ env.DISPLAY_VERSION }} \
            -p:ApplicationVersion=${{ env.VERSION_CODE }} \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="${{ github.workspace }}/BookLoggerApp/bookheart.keystore" \
            -p:AndroidSigningKeyAlias="$ANDROID_KEY_ALIAS" \
            -p:AndroidSigningKeyPass="$ANDROID_KEY_PASS" \
            -p:AndroidSigningStorePass="$ANDROID_STORE_PASS" \
            -p:AndroidPackageFormat=aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookheart-${{ github.ref_name }}-release
          path: BookLoggerApp/bin/Release/net10.0-android/publish/*.aab
          if-no-files-found: error
