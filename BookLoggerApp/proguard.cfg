# BookHeart — R8 rules (Release-only, Android).
#
# Strategy: keep R8 shrinking + optimization ACTIVE (smaller APK, dead-code
# elimination, inlining), but disable the rename pass. Without renaming,
# Firebase Crashlytics reports stay human-readable even though .NET MAUI
# currently does not upload an R8 mapping file to Firebase (known upstream
# limitation — see SECURITY.md "Analytics and Crash Reporting").
#
# Library-specific keep rules (Firebase, Google Play Services, ZXing, AndroidX)
# are bundled with their respective NuGets and consumed automatically — we
# deliberately do NOT duplicate them here.

-dontobfuscate

# Preserve source file names and line numbers so stack traces show exact
# locations (these attributes are otherwise stripped even without obfuscation
# when shrinking is aggressive).
-keepattributes SourceFile,LineNumberTable,Exceptions,InnerClasses
