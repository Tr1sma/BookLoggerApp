<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="chronicleTrunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B5638;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="parchmentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C4A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A97F;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="chronicleGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:0.15" />
    </radialGradient>
    <linearGradient id="potGradChronicle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A67C52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D4037;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Aged glow -->
  <ellipse cx="100" cy="85" rx="70" ry="55" fill="url(#chronicleGlow)" opacity="0.45"/>

  <!-- Pot -->
  <path d="M 58 160 L 66 192 L 134 192 L 142 160 Z" fill="url(#potGradChronicle)" stroke="#4A3F32" stroke-width="2"/>
  <ellipse cx="100" cy="160" rx="44" ry="12" fill="#8B6F47" stroke="#4A3F32" stroke-width="2"/>
  <ellipse cx="100" cy="160" rx="40" ry="8" fill="#3D3126"/>

  <!-- Gnarled ancient trunk -->
  <path d="M 100 160 Q 93 140 98 118 Q 105 96 96 74 Q 92 55 104 40" fill="none" stroke="url(#chronicleTrunkGrad)" stroke-width="15" stroke-linecap="round"/>

  <!-- Thick twisted branches -->
  <path d="M 98 95 Q 68 85 50 72" fill="none" stroke="#4A3F32" stroke-width="6" stroke-linecap="round"/>
  <path d="M 100 90 Q 130 82 152 68" fill="none" stroke="#4A3F32" stroke-width="6" stroke-linecap="round"/>
  <path d="M 100 70 Q 78 52 66 38" fill="none" stroke="#4A3F32" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 102 65 Q 122 48 138 36" fill="none" stroke="#4A3F32" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Parchment / scroll leaves with visible ruled lines -->
  <g stroke="#8B7355" stroke-width="0.7" fill="url(#parchmentGrad)">
    <rect x="45" y="58" width="20" height="15" rx="2" transform="rotate(-18 55 65)"/>
    <rect x="62" y="36" width="18" height="13" rx="2" transform="rotate(-10 71 42)"/>
    <rect x="93" y="28" width="20" height="15" rx="2"/>
    <rect x="122" y="36" width="18" height="13" rx="2" transform="rotate(10 131 42)"/>
    <rect x="137" y="56" width="20" height="15" rx="2" transform="rotate(18 147 63)"/>
    <rect x="146" y="78" width="14" height="11" rx="2" transform="rotate(25 153 83)"/>
    <rect x="42" y="78" width="14" height="11" rx="2" transform="rotate(-25 49 83)"/>
  </g>
  <g stroke="#8B7355" stroke-width="0.5" opacity="0.7">
    <!-- Ruled lines suggesting written words on the parchment leaves -->
    <line x1="49" y1="63" x2="63" y2="63" transform="rotate(-18 55 65)"/>
    <line x1="49" y1="67" x2="63" y2="67" transform="rotate(-18 55 65)"/>
    <line x1="97" y1="33" x2="111" y2="33"/>
    <line x1="97" y1="37" x2="111" y2="37"/>
    <line x1="140" y1="61" x2="154" y2="61" transform="rotate(18 147 63)"/>
    <line x1="140" y1="65" x2="154" y2="65" transform="rotate(18 147 63)"/>
  </g>

  <!-- Soft dust motes -->
  <circle cx="55" cy="50" r="2" fill="#E8C4A0" opacity="0.6"/>
  <circle cx="148" cy="50" r="2" fill="#E8C4A0" opacity="0.6"/>
  <circle cx="100" cy="20" r="2.5" fill="#E8C4A0" opacity="0.7"/>
  <circle cx="78" cy="30" r="1.5" fill="#D4A574" opacity="0.6"/>
  <circle cx="122" cy="30" r="1.5" fill="#D4A574" opacity="0.6"/>
</svg>
