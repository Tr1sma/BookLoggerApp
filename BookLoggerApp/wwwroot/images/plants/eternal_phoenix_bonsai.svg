<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="phoenixTrunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5D4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="phoenixLeafGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#E8C4A0;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#C9A97F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="phoenixAura" cx="50%" cy="55%">
      <stop offset="0%" style="stop-color:#E8C4A0;stop-opacity:0.65" />
      <stop offset="70%" style="stop-color:#D4A574;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:0.05" />
    </radialGradient>
    <linearGradient id="potGradPhoenix" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A97F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5638;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Phoenix aura -->
  <ellipse cx="100" cy="85" rx="82" ry="70" fill="url(#phoenixAura)"/>

  <!-- Shallow bonsai pot (flat, wide) -->
  <path d="M 42 158 L 48 186 L 152 186 L 158 158 Z" fill="url(#potGradPhoenix)" stroke="#3D3126" stroke-width="2"/>
  <ellipse cx="100" cy="158" rx="58" ry="10" fill="#A67C52" stroke="#3D3126" stroke-width="2"/>
  <ellipse cx="100" cy="158" rx="54" ry="6" fill="#2D2419"/>

  <!-- Bonsai-style twisted short trunk -->
  <path d="M 100 158 Q 90 148 98 136 Q 108 124 92 110 Q 80 100 100 88" fill="none" stroke="url(#phoenixTrunkGrad)" stroke-width="13" stroke-linecap="round"/>

  <!-- Asymmetric spread branches (bonsai aesthetic) -->
  <path d="M 100 108 Q 78 100 55 96" fill="none" stroke="#4A3F32" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 100 96 Q 125 92 148 88" fill="none" stroke="#4A3F32" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 100 90 Q 85 80 70 76" fill="none" stroke="#4A3F32" stroke-width="4" stroke-linecap="round"/>
  <path d="M 100 88 Q 120 78 135 72" fill="none" stroke="#4A3F32" stroke-width="4" stroke-linecap="round"/>

  <!-- Flame-shaped leaf clusters -->
  <g fill="url(#phoenixLeafGrad)" stroke="#6B5638" stroke-width="0.8">
    <path d="M 50 96 Q 46 86 52 80 Q 58 86 58 96 Z"/>
    <path d="M 62 98 Q 58 88 64 82 Q 70 88 70 98 Z"/>
    <path d="M 148 88 Q 144 78 150 72 Q 156 78 156 88 Z"/>
    <path d="M 136 90 Q 132 80 138 74 Q 144 80 144 90 Z"/>
    <path d="M 70 78 Q 66 68 72 62 Q 78 68 78 78 Z"/>
    <path d="M 135 72 Q 131 62 137 56 Q 143 62 143 72 Z"/>
    <path d="M 100 86 Q 96 74 102 66 Q 108 74 108 86 Z"/>
  </g>

  <!-- Rune particles floating -->
  <g fill="#E8C4A0" opacity="0.85" font-family="serif" font-size="11" font-weight="700" text-anchor="middle">
    <text x="42" y="60">ᚱ</text>
    <text x="160" y="60">ᛟ</text>
    <text x="100" y="26">ᚦ</text>
    <text x="70" y="38">ᚨ</text>
    <text x="130" y="38">ᛉ</text>
  </g>
  <g fill="#D4A574" opacity="0.75">
    <circle cx="52" cy="48" r="2"/>
    <circle cx="150" cy="48" r="2"/>
    <circle cx="90" cy="22" r="1.6"/>
    <circle cx="110" cy="22" r="1.6"/>
    <circle cx="82" cy="52" r="1.2"/>
    <circle cx="118" cy="52" r="1.2"/>
  </g>
</svg>
