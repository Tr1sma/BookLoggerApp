<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="brassBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4984A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brassRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE680;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4984A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ADD8E6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Tripod legs -->
  <line x1="100" y1="125" x2="60" y2="190" stroke="#8B6F47" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="125" x2="140" y2="190" stroke="#8B6F47" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="125" x2="100" y2="192" stroke="#8B6F47" stroke-width="4" stroke-linecap="round"/>

  <!-- Tripod feet -->
  <circle cx="60" cy="190" r="3" fill="#C4984A"/>
  <circle cx="140" cy="190" r="3" fill="#C4984A"/>
  <circle cx="100" cy="192" r="3" fill="#C4984A"/>

  <!-- Tripod joint -->
  <circle cx="100" cy="125" r="6" fill="url(#brassRing)" stroke="#8B6914" stroke-width="1.5"/>

  <!-- Main tube -->
  <rect x="50" y="65" width="110" height="22" rx="11" fill="url(#brassBody)" stroke="#8B6914" stroke-width="2" stroke-linecap="round" transform="rotate(-25 105 76)"/>

  <!-- Tube bands -->
  <ellipse cx="72" cy="80" rx="12" ry="6" fill="none" stroke="url(#brassRing)" stroke-width="2.5" transform="rotate(-25 72 80)"/>
  <ellipse cx="105" cy="65" rx="12" ry="6" fill="none" stroke="url(#brassRing)" stroke-width="2.5" transform="rotate(-25 105 65)"/>
  <ellipse cx="138" cy="50" rx="12" ry="6" fill="none" stroke="url(#brassRing)" stroke-width="2.5" transform="rotate(-25 138 50)"/>

  <!-- Lens end (objective) -->
  <ellipse cx="48" cy="90" rx="14" ry="8" fill="url(#lensGlow)" stroke="url(#brassRing)" stroke-width="2.5" transform="rotate(-25 48 90)"/>
  <!-- Lens glare -->
  <ellipse cx="45" cy="86" rx="5" ry="3" fill="#FFFFFF" opacity="0.2" transform="rotate(-25 45 86)"/>

  <!-- Eyepiece end -->
  <ellipse cx="155" cy="42" rx="10" ry="6" fill="url(#brassBody)" stroke="#8B6914" stroke-width="2" transform="rotate(-25 155 42)"/>

  <!-- Tube highlight -->
  <path d="M 60 72 L 145 38" fill="none" stroke="#FFE680" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="42" cy="82" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="158" cy="35" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="105" cy="55" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="75" cy="72" r="1.5" fill="#FFD700" opacity="0.5"/>
</svg>
