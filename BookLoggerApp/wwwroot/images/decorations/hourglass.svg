<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="brassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4984A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5E6D3;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#F5E6D3;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C87A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Top cap -->
  <rect x="60" y="22" width="80" height="10" rx="3" fill="url(#brassGrad)" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <rect x="65" y="30" width="70" height="6" rx="2" fill="#C4984A" stroke="#8B6914" stroke-width="1.5"/>

  <!-- Bottom cap -->
  <rect x="65" y="164" width="70" height="6" rx="2" fill="#C4984A" stroke="#8B6914" stroke-width="1.5"/>
  <rect x="60" y="168" width="80" height="10" rx="3" fill="url(#brassGrad)" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>

  <!-- Glass body - top half -->
  <path d="M 72 36 Q 72 70 82 85 Q 88 93 100 97 Q 112 93 118 85 Q 128 70 128 36" fill="url(#glassGrad)" stroke="#B8956A" stroke-width="2" stroke-linecap="round"/>

  <!-- Glass body - bottom half -->
  <path d="M 72 164 Q 72 130 82 115 Q 88 107 100 103 Q 112 107 118 115 Q 128 130 128 164" fill="url(#glassGrad)" stroke="#B8956A" stroke-width="2" stroke-linecap="round"/>

  <!-- Sand in top (partial) -->
  <path d="M 78 55 Q 78 70 85 82 Q 90 90 100 94 Q 110 90 115 82 Q 122 70 122 55 Z" fill="url(#sandGrad)" opacity="0.6"/>

  <!-- Sand in bottom (collected) -->
  <path d="M 75 164 Q 75 140 85 128 Q 92 118 100 115 Q 108 118 115 128 Q 125 140 125 164 Z" fill="url(#sandGrad)" opacity="0.8"/>

  <!-- Falling sand stream -->
  <line x1="100" y1="97" x2="100" y2="115" stroke="#D4A574" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Side pillars -->
  <line x1="72" y1="36" x2="72" y2="164" stroke="#C4984A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="128" y1="36" x2="128" y2="164" stroke="#C4984A" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Glass highlight -->
  <path d="M 80 45 Q 78 65 84 80" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="85" cy="45" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="115" cy="155" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="100" cy="18" r="1.5" fill="#FFD700" opacity="0.6"/>
</svg>
