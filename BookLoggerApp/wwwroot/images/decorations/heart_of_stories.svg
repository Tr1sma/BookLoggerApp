<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C4A0;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="heartAura" cx="50%" cy="55%">
      <stop offset="0%" style="stop-color:#E8C4A0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="heartHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6D3;stop-opacity:0.75" />
      <stop offset="60%" style="stop-color:#F5E6D3;stop-opacity:0" />
    </linearGradient>
    <filter id="heartShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3E2723" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Pulsing glow -->
  <circle cx="100" cy="108" r="82" fill="url(#heartAura)"/>

  <!-- Heart silhouette (rich beige gradient) -->
  <path d="M 100 165
           C 60 135, 30 112, 30 80
           C 30 58, 48 42, 68 42
           C 82 42, 94 50, 100 62
           C 106 50, 118 42, 132 42
           C 152 42, 170 58, 170 80
           C 170 112, 140 135, 100 165 Z"
        fill="url(#heartGrad)"
        stroke="#6B5638"
        stroke-width="2"
        filter="url(#heartShadow)"/>

  <!-- Top-left glossy highlight -->
  <path d="M 100 155
           C 65 130, 38 108, 38 80
           C 38 62, 54 48, 68 48
           C 82 48, 94 56, 100 68 Z"
        fill="url(#heartHighlight)"
        opacity="0.55"/>

  <!-- Open-book emblem in the heart's center -->
  <g transform="translate(100 100)">
    <!-- Book spine shadow -->
    <rect x="-2" y="-18" width="4" height="36" fill="#6B5638" opacity="0.45"/>
    <!-- Left page -->
    <path d="M -28 -14 Q -14 -18 0 -14 L 0 18 Q -14 14 -28 18 Z"
          fill="#F5E6D3" stroke="#6B5638" stroke-width="1.2"/>
    <!-- Right page -->
    <path d="M 28 -14 Q 14 -18 0 -14 L 0 18 Q 14 14 28 18 Z"
          fill="#F5E6D3" stroke="#6B5638" stroke-width="1.2"/>
    <!-- Ruled lines -->
    <g stroke="#A67874" stroke-width="0.7" opacity="0.6">
      <line x1="-22" y1="-8" x2="-6" y2="-10"/>
      <line x1="-22" y1="-2" x2="-6" y2="-4"/>
      <line x1="-22" y1="4" x2="-6" y2="2"/>
      <line x1="-22" y1="10" x2="-6" y2="8"/>
      <line x1="6" y1="-10" x2="22" y2="-8"/>
      <line x1="6" y1="-4" x2="22" y2="-2"/>
      <line x1="6" y1="2" x2="22" y2="4"/>
      <line x1="6" y1="8" x2="22" y2="10"/>
    </g>
  </g>

  <!-- Floating rune sparkles around the heart -->
  <g fill="#E8C4A0" opacity="0.9">
    <circle cx="38" cy="58" r="2.5"/>
    <circle cx="162" cy="58" r="2.5"/>
    <circle cx="22" cy="100" r="2"/>
    <circle cx="178" cy="100" r="2"/>
    <circle cx="60" cy="30" r="1.8"/>
    <circle cx="140" cy="30" r="1.8"/>
    <circle cx="100" cy="22" r="2.2"/>
  </g>
</svg>
