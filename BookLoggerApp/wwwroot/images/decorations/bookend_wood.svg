<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="woodGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A67C52;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4984A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="woodGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8956A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="woodSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7A5F3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5638;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Base plate -->
  <path d="M 40 170 L 40 160 L 160 160 L 160 170 Z" fill="url(#woodGrad2)" stroke="#6B5638" stroke-width="2" stroke-linecap="round"/>
  <path d="M 40 160 L 55 150 L 175 150 L 160 160 Z" fill="#C4984A" stroke="#6B5638" stroke-width="2" stroke-linecap="round"/>
  <path d="M 160 160 L 175 150 L 175 162 L 160 170 Z" fill="url(#woodSide)" stroke="#6B5638" stroke-width="2" stroke-linecap="round"/>

  <!-- Vertical plate -->
  <rect x="40" y="45" width="20" height="115" rx="2" fill="url(#woodGrad1)" stroke="#6B5638" stroke-width="2" stroke-linecap="round"/>
  <path d="M 60 45 L 75 35 L 75 150 L 60 160 Z" fill="#C4984A" stroke="#6B5638" stroke-width="2" stroke-linecap="round"/>

  <!-- Wood grain lines on vertical -->
  <line x1="47" y1="55" x2="47" y2="150" stroke="#8B6F47" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="53" y1="50" x2="53" y2="155" stroke="#8B6F47" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <path d="M 65 40 Q 67 80 65 120 Q 63 145 65 150" fill="none" stroke="#A67C52" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <path d="M 70 38 Q 72 75 70 110 Q 68 140 70 148" fill="none" stroke="#A67C52" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Wood grain on base -->
  <line x1="55" y1="165" x2="145" y2="165" stroke="#7A5F3A" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <path d="M 60 155 Q 100 152 155 155" fill="none" stroke="#A67C52" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- Small decorative book leaning against bookend -->
  <rect x="68" y="65" width="18" height="95" rx="2" fill="#8B4513" stroke="#5D3A1A" stroke-width="1.5" transform="rotate(5 77 112)"/>
  <line x1="77" y1="68" x2="77" y2="157" stroke="#D4A574" stroke-width="1" opacity="0.5" transform="rotate(5 77 112)"/>
  <rect x="90" y="58" width="18" height="102" rx="2" fill="#A0522D" stroke="#6B3A20" stroke-width="1.5" transform="rotate(8 99 109)"/>

  <!-- Sparkles -->
  <circle cx="48" cy="55" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="150" cy="155" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="72" cy="42" r="1.5" fill="#FFD700" opacity="0.5"/>
</svg>
