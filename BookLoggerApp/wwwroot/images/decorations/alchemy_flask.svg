<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="flaskGlass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8E0D4;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#E8E0D4;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CCD7C;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#3A8B3A;stop-opacity:0.9" />
    </linearGradient>
    <radialGradient id="liquidGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3A8B3A;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="65%" r="50%">
      <stop offset="0%" style="stop-color:#7CCD7C;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7CCD7C;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="corkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A67C52;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="100" cy="130" rx="55" ry="50" fill="url(#outerGlow)"/>

  <!-- Flask body (round bottom) -->
  <circle cx="100" cy="135" r="48" fill="url(#flaskGlass)" stroke="#B8B0A4" stroke-width="2"/>

  <!-- Neck -->
  <rect x="90" y="62" width="20" height="30" fill="url(#flaskGlass)" stroke="#B8B0A4" stroke-width="2"/>

  <!-- Neck-to-body connection -->
  <path d="M 90 92 Q 85 95 72 110 Q 58 130 55 145" fill="none" stroke="#B8B0A4" stroke-width="2" stroke-linecap="round"/>
  <path d="M 110 92 Q 115 95 128 110 Q 142 130 145 145" fill="none" stroke="#B8B0A4" stroke-width="2" stroke-linecap="round"/>

  <!-- Liquid inside -->
  <path d="M 60 145 Q 58 130 68 115 Q 78 105 90 98 L 90 110 Q 78 118 70 130 Q 65 140 64 150 Q 68 165 85 175 Q 100 182 115 175 Q 132 165 136 150 Q 135 140 130 130 Q 122 118 110 110 L 110 98 Q 122 105 132 115 Q 142 130 140 145 Q 138 160 125 172 Q 110 183 100 185 Q 90 183 75 172 Q 62 160 60 145 Z" fill="url(#liquidGrad)" opacity="0.7"/>

  <!-- Liquid glow -->
  <circle cx="100" cy="145" r="35" fill="url(#liquidGlow)" opacity="0.5"/>

  <!-- Bubbles -->
  <circle cx="90" cy="150" r="3" fill="#90EE90" opacity="0.4" stroke="#7CCD7C" stroke-width="0.5"/>
  <circle cx="108" cy="140" r="2" fill="#90EE90" opacity="0.3" stroke="#7CCD7C" stroke-width="0.5"/>
  <circle cx="95" cy="130" r="2.5" fill="#90EE90" opacity="0.35" stroke="#7CCD7C" stroke-width="0.5"/>
  <circle cx="112" cy="158" r="1.5" fill="#90EE90" opacity="0.3"/>
  <circle cx="85" cy="165" r="2" fill="#90EE90" opacity="0.3"/>

  <!-- Glass highlight -->
  <path d="M 75 110 Q 70 130 72 150" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  <path d="M 92 68 L 92 85" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

  <!-- Cork stopper -->
  <rect x="88" y="55" width="24" height="10" rx="3" fill="url(#corkGrad)" stroke="#8B6F47" stroke-width="1.5"/>
  <!-- Cork grain -->
  <line x1="93" y1="57" x2="93" y2="63" stroke="#B8956A" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="100" y1="56" x2="100" y2="64" stroke="#B8956A" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="107" y1="57" x2="107" y2="63" stroke="#B8956A" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>

  <!-- Rim ring -->
  <rect x="87" y="62" width="26" height="4" rx="1" fill="#C4984A" stroke="#8B6914" stroke-width="1"/>

  <!-- Sparkles (magical) -->
  <circle cx="75" cy="105" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="128" cy="115" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="100" cy="50" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="65" cy="160" r="1.5" fill="#7CCD7C" opacity="0.6"/>
  <circle cx="135" cy="155" r="1.5" fill="#7CCD7C" opacity="0.6"/>
</svg>
