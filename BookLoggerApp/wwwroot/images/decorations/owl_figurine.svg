<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="owlBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A67C52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="owlBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4984A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#FFE680;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB800;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="45" ry="50" fill="url(#owlBody)" stroke="#6B5638" stroke-width="2"/>

  <!-- Belly feather pattern -->
  <ellipse cx="100" cy="140" rx="28" ry="35" fill="url(#owlBelly)" stroke="#8B7355" stroke-width="1.5"/>
  <!-- Feather lines on belly -->
  <path d="M 82 120 Q 100 125 118 120" fill="none" stroke="#B8956A" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M 80 132 Q 100 137 120 132" fill="none" stroke="#B8956A" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M 80 144 Q 100 149 120 144" fill="none" stroke="#B8956A" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M 82 156 Q 100 161 118 156" fill="none" stroke="#B8956A" stroke-width="1" opacity="0.5" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="100" cy="78" rx="38" ry="30" fill="url(#owlBody)" stroke="#6B5638" stroke-width="2"/>

  <!-- Ear tufts -->
  <path d="M 68 58 L 60 35 L 78 52" fill="#8B6F47" stroke="#6B5638" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 132 58 L 140 35 L 122 52" fill="#8B6F47" stroke="#6B5638" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eye circles (white) -->
  <circle cx="82" cy="75" r="16" fill="#F5E6D3" stroke="#6B5638" stroke-width="2"/>
  <circle cx="118" cy="75" r="16" fill="#F5E6D3" stroke="#6B5638" stroke-width="2"/>

  <!-- Irises -->
  <circle cx="82" cy="75" r="10" fill="url(#eyeGrad)" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="118" cy="75" r="10" fill="url(#eyeGrad)" stroke="#B8860B" stroke-width="1.5"/>

  <!-- Pupils -->
  <circle cx="82" cy="74" r="5" fill="#2A2A35"/>
  <circle cx="118" cy="74" r="5" fill="#2A2A35"/>

  <!-- Eye highlights -->
  <circle cx="79" cy="71" r="2.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="115" cy="71" r="2.5" fill="#FFFFFF" opacity="0.8"/>

  <!-- Beak -->
  <path d="M 96 85 L 100 95 L 104 85 Z" fill="#C4984A" stroke="#8B6914" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Wings (folded) -->
  <path d="M 56 110 Q 48 130 55 155 Q 60 165 65 170" fill="none" stroke="#6B5638" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 144 110 Q 152 130 145 155 Q 140 165 135 170" fill="none" stroke="#6B5638" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Feet -->
  <path d="M 80 178 L 75 190 M 80 178 L 80 190 M 80 178 L 85 190" stroke="#C4984A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 120 178 L 115 190 M 120 178 L 120 190 M 120 178 L 125 190" stroke="#C4984A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="58" cy="40" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="142" cy="40" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="100" cy="25" r="1.5" fill="#FFD700" opacity="0.6"/>
</svg>
